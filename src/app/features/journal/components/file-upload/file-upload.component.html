<div class="file-upload-container">
  <form [formGroup]="uploadForm" (ngSubmit)="onSubmit()" class="upload-form">
    <!-- File Selection -->
    <div class="form-group">
      <label for="file" class="form-label">Select File *</label>
      <input 
        type="file" 
        id="file" 
        class="form-input"
        accept=".csv,.xlsx,.xls,.json"
        (change)="onFileSelect($event)"
        [class.error]="uploadForm.get('file')?.invalid && uploadForm.get('file')?.touched"
      >
      <div class="file-info" *ngIf="selectedFile">
        <span class="file-name">{{ fileName }}</span>
        <span class="file-size">{{ fileSize }}</span>
      </div>
      <div class="error-message" *ngIf="uploadForm.get('file')?.invalid && uploadForm.get('file')?.touched">
        Please select a file
      </div>
    </div>

    <!-- File Type -->
    <div class="form-group">
      <label for="fileType" class="form-label">File Type *</label>
      <select 
        id="fileType" 
        formControlName="fileType" 
        class="form-select"
        [class.error]="uploadForm.get('fileType')?.invalid && uploadForm.get('fileType')?.touched"
      >
        <option value="CSV">CSV</option>
        <option value="EXCEL">Excel</option>
        <option value="JSON">JSON</option>
      </select>
      <div class="error-message" *ngIf="uploadForm.get('fileType')?.invalid && uploadForm.get('fileType')?.touched">
        File type is required
      </div>
    </div>

    <!-- Source System -->
    <div class="form-group">
      <label for="sourceSystem" class="form-label">Source System *</label>
      <input 
        type="text" 
        id="sourceSystem" 
        formControlName="sourceSystem" 
        class="form-input"
        placeholder="e.g., UI, API, MANUAL"
        [class.error]="uploadForm.get('sourceSystem')?.invalid && uploadForm.get('sourceSystem')?.touched"
      >
      <div class="error-message" *ngIf="uploadForm.get('sourceSystem')?.invalid && uploadForm.get('sourceSystem')?.touched">
        Source system is required
      </div>
    </div>

    <!-- File Category -->
    <div class="form-group">
      <label for="fileCategory" class="form-label">File Category *</label>
      <select 
        id="fileCategory" 
        formControlName="fileCategory" 
        class="form-select"
        [class.error]="uploadForm.get('fileCategory')?.invalid && uploadForm.get('fileCategory')?.touched"
      >
        <option value="TRADE_BOOK">Trade Book</option>
        <option value="PORTFOLIO">Portfolio</option>
        <option value="REPORTS">Reports</option>
        <option value="OTHER">Other</option>
      </select>
      <div class="error-message" *ngIf="uploadForm.get('fileCategory')?.invalid && uploadForm.get('fileCategory')?.touched">
        File category is required
      </div>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label for="description" class="form-label">Description *</label>
      <textarea 
        id="description" 
        formControlName="description" 
        class="form-textarea"
        rows="3"
        placeholder="Enter file description..."
        [class.error]="uploadForm.get('description')?.invalid && uploadForm.get('description')?.touched"
      ></textarea>
      <div class="error-message" *ngIf="uploadForm.get('description')?.invalid && uploadForm.get('description')?.touched">
        Description is required
      </div>
    </div>

    <!-- Submit Button -->
    <div class="form-actions">
      <button 
        type="submit" 
        class="btn btn-primary"
        [disabled]="isUploading || uploadForm.invalid"
      >
        <span *ngIf="!isUploading">Upload File</span>
        <span *ngIf="isUploading" class="loading-spinner">
          Uploading...
        </span>
      </button>
      
      <button 
        type="button" 
        class="btn btn-secondary"
        (click)="resetForm()"
        [disabled]="isUploading"
      >
        Clear
      </button>
    </div>
  </form>

  <!-- Success Message -->
  <div class="alert alert-success" *ngIf="uploadSuccessInternal">
    <div class="alert-content">
      <h4>Upload Successful!</h4>
      <p>Your file has been uploaded and processed successfully.</p>
    </div>
  </div>

  <!-- Error Message -->
  <div class="alert alert-error" *ngIf="uploadError">
    <div class="alert-content">
      <h4>Upload Failed</h4>
      <p>{{ uploadError }}</p>
    </div>
  </div>
</div>
